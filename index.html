<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Countdown al nostro prossimo incontro patata❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-light: #fff0f5;
      --pink-mid: #ffd6e7;
      --pink-deep: #f9a8c9;
      --pink-accent: #e8638c;
      --rose: #c94070;
      --cream: #fff8fb;
      --shadow: rgba(200, 60, 100, 0.18);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe4f0 0%, #ffd1e8 30%, #ffb8d9 60%, #ffc8e2 100%);
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Floating Hearts ── */
    .hearts-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      bottom: -60px;
      animation: floatUp linear infinite;
      opacity: 0;
      user-select: none;
      font-size: 1.4rem;
      filter: drop-shadow(0 0 4px rgba(233, 90, 130, 0.4));
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) translateX(0) scale(0.8) rotate(-10deg); opacity: 0; }
      10%  { opacity: 0.7; }
      50%  { transform: translateY(-45vh) translateX(var(--drift)) scale(1) rotate(10deg); opacity: 0.5; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-105vh) translateX(calc(var(--drift)*1.5)) scale(0.6) rotate(-5deg); opacity: 0; }
    }

    /* ── Main Card ── */
    .card {
      position: relative;
      z-index: 1;
      background: linear-gradient(160deg, rgba(255,255,255,0.82) 0%, rgba(255,240,248,0.88) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.7);
      border-radius: 36px;
      padding: 52px 44px 44px;
      max-width: 760px;
      width: 95%;
      box-shadow: 0 20px 60px var(--shadow), 0 4px 20px rgba(255,180,210,0.3);
      text-align: center;
    }

    /* ── Title ── */
    .title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.3rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--rose);
      letter-spacing: 0.02em;
      margin-bottom: 16px;
      margin-top: 8px;
      line-height: 1.3;
      text-shadow: 0 2px 12px rgba(220, 70, 110, 0.15);
    }

    /* ── Photos Semicircle ── */
    .photos-arc {
      position: relative;
      width: 100%;
      height: 200px;
      margin-bottom: 28px;
    }
    .photo-wrap {
      position: absolute;
      width: 90px;
      height: 90px;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
    }
    .photo-wrap:hover { transform: translate(-50%, -50%) scale(1.13) !important; }
    .photo-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3.5px solid #fff;
      box-shadow: 0 6px 22px rgba(200,50,90,0.22), 0 2px 8px rgba(0,0,0,0.08);
      display: block;
    }

    /* ── Countdown ── */
    .countdown {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 3vw, 28px);
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 72px;
    }
    .number {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.6rem, 8vw, 4.4rem);
      font-weight: 700;
      color: var(--rose);
      line-height: 1;
      text-shadow: 0 3px 16px rgba(220,70,110,0.18);
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), color 0.2s;
      display: inline-block;
    }
    .number.bump {
      transform: scale(1.22);
      color: var(--pink-accent);
    }
    .label {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(0.7rem, 2vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c07090;
      margin-top: 6px;
    }
    .separator {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.4rem);
      color: var(--pink-deep);
      line-height: 1;
      align-self: flex-start;
      margin-top: 8px;
      opacity: 0.7;
    }

    /* ── Finished Message ── */
    .finished {
      display: none;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 700;
      color: var(--rose);
      animation: pulse 1.4s ease-in-out infinite;
      text-shadow: 0 4px 20px rgba(220,70,110,0.25);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    /* ── Decorative divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin: 28px 0 22px;
      color: var(--pink-deep);
      font-size: 1.1rem;
      letter-spacing: 0.1em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--pink-deep), transparent);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .card { padding: 36px 20px 32px; }
      .photos-arc {
        height: auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        position: static;
        margin-bottom: 20px;
      }
      .photo-wrap {
        position: static;
        width: 100%;
        height: auto;
        aspect-ratio: 1;
        transform: none !important;
      }
      .photo-wrap:hover { transform: scale(1.09) !important; }
      .photo-wrap img { width: 100%; height: 100%; }
      .separator { display: none; }
      .countdown { gap: 8px; }
      .unit { min-width: 56px; }
    }
  </style>
</head>
<body>

  <div class="hearts-container" id="heartsContainer"></div>

  <div class="card">
    <!-- Photos arc -->
    <div class="photos-arc" id="photosArc">
      <div class="photo-wrap" id="pw0"><img src="photo1.jpg" alt="Foto 1"/></div>
      <div class="photo-wrap" id="pw1"><img src="photo2.jpg" alt="Foto 2"/></div>
      <div class="photo-wrap" id="pw2"><img src="photo3.jpg" alt="Foto 3"/></div>
      <div class="photo-wrap" id="pw3"><img src="photo4.jpg" alt="Foto 4"/></div>
      <div class="photo-wrap" id="pw4"><img src="photo5.jpg" alt="Foto 5"/></div>
      <div class="photo-wrap" id="pw5"><img src="photo6.jpg" alt="Foto 6"/></div>
    </div>

    <h1 class="title">Countdown al prossimo incontro patata❤️</h1>

    <div class="divider">✦ ❤️ ✦</div>

    <!-- Countdown -->
    <div class="countdown" id="countdown">
      <div class="unit">
        <span class="number" id="days">00</span>
        <span class="label">Giorni</span>
      </div>
      <span class="separator">:</span>
      <div class="unit">
        <span class="number" id="hours">00</span>
        <span class="label">Ore</span>
      </div>
      <span class="separator">:</span>
      <div class="unit">
        <span class="number" id="minutes">00</span>
        <span class="label">Minuti</span>
      </div>
      <span class="separator">:</span>
      <div class="unit">
        <span class="number" id="seconds">00</span>
        <span class="label">Secondi</span>
      </div>
    </div>

    <!-- Finished -->
    <div class="finished" id="finished">Finalmente insieme ❤️</div>
  </div>

  <script>
    /* ── Floating Hearts ── */
    const container = document.getElementById('heartsContainer');
    const heartEmojis = ['❤️','🩷','💕','💗','💓','💖','💝','🌸'];
    const HEART_COUNT = 28;

    function createHeart() {
      const h = document.createElement('span');
      h.classList.add('heart');
      h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      const left = Math.random() * 100;
      const drift = (Math.random() - 0.5) * 120;
      const duration = 9 + Math.random() * 12;
      const delay = Math.random() * 14;
      const size = 0.8 + Math.random() * 1.4;
      h.style.cssText = `
        left: ${left}%;
        font-size: ${size}rem;
        animation-duration: ${duration}s;
        animation-delay: ${delay}s;
        --drift: ${drift}px;
      `;
      container.appendChild(h);
    }
    for (let i = 0; i < HEART_COUNT; i++) createHeart();

    /* ── Semicircle Photos ── */
    function positionPhotos() {
      if (window.innerWidth <= 600) return; // CSS grid handles mobile
      const arc = document.getElementById('photosArc');
      const n = 6;
      const cx = arc.offsetWidth / 2;
      const cy = arc.offsetHeight - 10;          // centro in basso
      const r = Math.min(arc.offsetWidth * 0.42, 200);
      const startAngle = Math.PI;                // 180° (sinistra)
      const endAngle   = 2 * Math.PI;            // 360° (destra) → arco superiore
      for (let i = 0; i < n; i++) {
        const t = startAngle + (endAngle - startAngle) * (i / (n - 1));
        const x = cx + r * Math.cos(t);
        const y = cy + r * Math.sin(t);          // sin negativo → verso l'alto
        const pw = document.getElementById('pw' + i);
        pw.style.cssText = `
          left: ${x}px;
          top: ${y}px;
          transform: translate(-50%, -50%);
          position: absolute;
          width: 88px;
          height: 88px;
          transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
        `;
      }
    }
    window.addEventListener('resize', positionPhotos);
    window.addEventListener('load', positionPhotos);
    positionPhotos();

    /* ── Countdown ── */
    const target = new Date('2026-06-12T00:00:00');
    const elDays    = document.getElementById('days');
    const elHours   = document.getElementById('hours');
    const elMinutes = document.getElementById('minutes');
    const elSeconds = document.getElementById('seconds');
    const elCountdown = document.getElementById('countdown');
    const elFinished  = document.getElementById('finished');

    function pad(n) { return String(n).padStart(2, '0'); }

    function bump(el, newVal) {
      const cur = el.textContent;
      if (cur !== newVal) {
        el.textContent = newVal;
        el.classList.remove('bump');
        void el.offsetWidth; // reflow
        el.classList.add('bump');
        setTimeout(() => el.classList.remove('bump'), 300);
      }
    }

    function tick() {
      const now  = new Date();
      const diff = target - now;
      if (diff <= 0) {
        elCountdown.style.display = 'none';
        elFinished.style.display  = 'block';
        return;
      }
      const totalSec = Math.floor(diff / 1000);
      const s = totalSec % 60;
      const m = Math.floor(totalSec / 60) % 60;
      const h = Math.floor(totalSec / 3600) % 24;
      const d = Math.floor(totalSec / 86400);

      bump(elDays,    pad(d));
      bump(elHours,   pad(h));
      bump(elMinutes, pad(m));
      bump(elSeconds, pad(s));
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
